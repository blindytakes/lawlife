<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0E0E18"/>
      <stop offset="50%" stop-color="#09090E"/>
      <stop offset="100%" stop-color="#0E0E18"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="rgba(200,169,110,0.08)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Top gold accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="#C8A96E"/>

  <!-- Grid pattern (subtle) -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(200,169,110,0.04)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5"/>

  <!-- Firm name -->
  <text x="100" y="200" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="700" fill="#F5F0E8" letter-spacing="1">Keibler Law Group</text>

  <!-- Tagline -->
  <text x="100" y="250" font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="600" fill="#C8A96E" letter-spacing="6" text-transform="uppercase">TRIAL ATTORNEYS  ·  SC &amp; NC</text>

  <!-- Gold divider -->
  <rect x="100" y="280" width="80" height="2" fill="#C8A96E"/>

  <!-- Headline -->
  <text x="100" y="340" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="400" font-style="italic" fill="#C8A96E">Fighting for Justice</text>
  <text x="100" y="395" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="400" fill="#F5F0E8">You Deserve.</text>

  <!-- Description -->
  <text x="100" y="460" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" fill="#8A8799">Catastrophic Injury  |  Business Litigation  |  Wrongful Death</text>
  <text x="100" y="490" font-family="'Helvetica Neue', Arial, sans-serif" font-size="20" fill="#8A8799">Free Consultation  ·  No Fee Unless We Win</text>

  <!-- Bottom bar -->
  <rect x="0" y="560" width="1200" height="70" fill="rgba(200,169,110,0.08)"/>
  <rect x="0" y="560" width="1200" height="1" fill="rgba(200,169,110,0.2)"/>
  <text x="100" y="603" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="600" fill="#C8A96E" letter-spacing="3">KEIBLERLAWGROUP.COM</text>
  <text x="1100" y="603" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#7A6440" text-anchor="end">Licensed in South Carolina &amp; North Carolina</text>
</svg>
